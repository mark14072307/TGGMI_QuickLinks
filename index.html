<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TG German Metalcraft Industries Pvt Ltd</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>

    :root {
      --bg:     #080a0e;
      --blue:   #0b2b77;
      --spark:  #2a54b7;
      --white:  #f0f4fa;
      --silver: #b8c8d8;
      --muted:  #4a5a6c;
      --border: rgba(42,84,183,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      font-family: 'Titillium Web', sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: #080a0e;
    }

    /* Grid lines */
    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(42,84,183,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,84,183,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 40%, transparent 100%);
    }

    /* Radial vignette + center glow */
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 50%, rgba(17,52,134,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 100% 100% at 50% 50%, transparent 55%, rgba(4,5,8,0.95) 100%);
    }

    /* Noise grain overlay */
    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .55;
    }

    /* Top + bottom edge lines */
    .edge-top {
      position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 2;
      background: linear-gradient(90deg, transparent, var(--spark), transparent);
      opacity: .6;
    }
    .edge-bottom {
      position: fixed; bottom: 0; left: 0; right: 0; height: 2px; z-index: 2;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      opacity: .4;
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 10;
      height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 clamp(16px, 5vw, 40px);
      gap: 0;
    }

    /* ── Redirect bar — top of page, outside card ── */
    .redirect-bar {
      position: fixed; top: 2px; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      gap: 14px;
      padding: 9px 20px;
      background: rgba(17,52,134,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(42,84,183,0.5);
    }
    .redirect-text {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--silver); font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .redirect-num {
      font-family: 'Anton', sans-serif;
      font-size: 20px; color: #fff; line-height: 1;
      min-width: 16px; text-align: center;
    }
    .redirect-cancel {
      font-family: 'Titillium Web', sans-serif;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(184,200,216,0.6); font-weight: 700;
      background: none; border: 1px solid rgba(42,84,183,0.35);
      padding: 3px 10px; border-radius: 2px; cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .redirect-cancel:hover { color: #fff; border-color: var(--spark); }
    .redirect-progress {
      position: absolute; bottom: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--spark), #5b8fff);
      width: 100%; transform-origin: left;
      animation: drain 5s linear forwards;
    }
    @keyframes drain { from{transform:scaleX(1)} to{transform:scaleX(0)} }

    /* ── Logo block ── */
    .logo-block {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: clamp(20px, 4vh, 36px);
      animation: riseIn .9s cubic-bezier(.2,.65,.3,1) both;
    }
    @keyframes riseIn { from{opacity:0; transform:translateY(16px)} to{opacity:1; transform:translateY(0)} }

    .logo-img {
      width: clamp(72px, 16vw, 100px);
      height: clamp(72px, 16vw, 100px);
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(42,84,183,0.55));
      margin-bottom: clamp(12px, 2.5vh, 20px);
      display: block;
    }
    .logo-fallback {
      font-family: 'Anton', sans-serif; font-size: 36px;
      background: linear-gradient(135deg, #5b8fff, #2a54b7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: clamp(12px, 2.5vh, 20px);
      display: none;
    }

    .company-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(22px, 6vw, 38px);
      letter-spacing: 3px; text-transform: uppercase;
      line-height: 1; text-align: center;
    }
    .company-title .tg {
      background: linear-gradient(90deg, #5b8fff, var(--spark));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .company-sub {
      margin-top: 5px;
      font-size: clamp(8px, 1.8vw, 10px);
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); font-weight: 600; text-align: center;
    }

    /* Divider line */
    .divider {
      width: clamp(180px, 55vw, 280px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: clamp(16px, 3vh, 28px) auto;
      flex-shrink: 0;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      max-width: 340px;
      display: flex; flex-direction: column;
      gap: clamp(7px, 1.4vh, 11px);
      animation: riseIn 1s .15s cubic-bezier(.2,.65,.3,1) both;
    }

    .link-card {
      display: flex; align-items: center;
      gap: 14px;
      padding: clamp(11px, 2vh, 15px) 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      text-decoration: none;
      color: var(--white);
      position: relative; overflow: hidden;
      transition: background .2s, border-color .2s, transform .18s;
    }
    /* Left glow on hover */
    .link-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(to bottom, var(--spark), #5b8fff);
      transform: scaleY(0); transform-origin: center;
      transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    /* Shimmer */
    .link-card::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
      transition: left .5s ease;
    }
    .link-card:hover {
      background: rgba(42,84,183,0.1);
      border-color: rgba(42,84,183,0.5);
      transform: translateX(4px);
    }
    .link-card:hover::before { transform: scaleY(1); }
    .link-card:hover::after  { left: 140%; }

    .link-icon { width: 26px; height: 26px; flex-shrink: 0; display: grid; place-items: center; }
    .link-icon svg { width: 24px; height: 24px; display: block; transition: transform .2s; }
    .link-card:hover .link-icon svg { transform: scale(1.12); }

    .link-name {
      font-family: 'Titillium Web', sans-serif;
      font-size: clamp(12px, 2.8vw, 14px);
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--white); flex: 1;
    }

    .link-arrow {
      font-size: 13px; color: var(--muted);
      transition: color .2s, transform .2s; flex-shrink: 0;
    }
    .link-card:hover .link-arrow { color: var(--spark); transform: translateX(3px); }

    /* ── Footer ── */
    .footer-text {
      margin-top: clamp(16px, 3vh, 26px);
      font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); text-align: center;
      animation: riseIn 1s .25s cubic-bezier(.2,.65,.3,1) both;
    }

    /* ── Height-based scaling for no-scroll ── */
    @media (max-height: 750px) {
      .logo-img, .logo-fallback { width: 64px; height: 64px; margin-bottom: 10px; }
      .logo-block { margin-bottom: 16px; }
      .divider { margin: 12px auto; }
      .links { gap: 6px; }
      .link-card { padding: 10px 16px; }
      .footer-text { margin-top: 12px; }
    }
    @media (max-height: 660px) {
      .logo-img, .logo-fallback { width: 52px; height: 52px; margin-bottom: 8px; }
      .logo-block { margin-bottom: 12px; }
      .company-title { font-size: 20px; }
      .company-sub { display: none; }
      .divider { margin: 10px auto; }
      .links { gap: 5px; }
      .link-card { padding: 9px 14px; }
      .footer-text { display: none; }
    }
    @media (max-height: 560px) {
      .redirect-bar { display: none; }
      .logo-block { margin-bottom: 8px; }
      .logo-img, .logo-fallback { width: 42px; height: 42px; margin-bottom: 6px; }
      .divider { display: none; }
      .links { gap: 4px; }
      .link-card { padding: 8px 12px; }
    }

  </style>
</head>
<body>

  <script>
    (function () {
      var WEBSITE = 'https://tggerman.vercel.app/';
      var secs = 5;
      var cancelled = false;
      var countEl = document.getElementById('countdown');
      var barEl   = document.getElementById('redirectBar');
      var progEl  = document.getElementById('redirectProgress');

      var timer = setInterval(function () {
        secs--;
        if (countEl) countEl.textContent = secs;
        if (secs <= 0) {
          clearInterval(timer);
          if (!cancelled) window.location.href = WEBSITE;
        }
      }, 1000);

      window.cancelRedirect = function () {
        cancelled = true;
        clearInterval(timer);
        if (progEl) { progEl.style.animation = 'none'; progEl.style.transform = 'scaleX(0)'; }
        if (barEl) {
          barEl.style.background = 'rgba(10,12,16,0.92)';
          barEl.style.borderBottomColor = 'rgba(42,84,183,0.15)';
          var t = barEl.querySelector('.redirect-text');
          var b = barEl.querySelector('.redirect-cancel');
          if (t) t.innerHTML = '<span style="letter-spacing:2px;color:#4a5a6c">REDIRECT CANCELLED</span>';
          if (b) b.style.display = 'none';
        }
      };
    })();
  </script>
